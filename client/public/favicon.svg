<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#8B5CF6"/>
  
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  
  <!-- Top gap in outer ring -->
  <rect x="14" y="4" width="4" height="8" fill="#8B5CF6"/>
  
  <!-- Bottom gap in outer ring -->
  <rect x="14" y="20" width="4" height="8" fill="#8B5CF6"/>
  
  <!-- Inner circle for G -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Right gap for G opening -->
  <rect x="16" y="9" width="7" height="14" fill="#8B5CF6"/>
  
  <!-- G horizontal bar -->
  <rect x="16" y="14" width="5" height="4" fill="#FFFFFF"/>
