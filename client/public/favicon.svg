<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background with better contrast -->
  <rect width="32" height="32" fill="url(#bg)" rx="6"/>
  
  <!-- White outline for better visibility -->
  <rect width="32" height="32" fill="none" stroke="white" stroke-width="1" rx="6"/>
  
  <!-- Parachute canopy - thicker and more visible -->
  <path d="M 6 12 Q 16 4 26 12" stroke="white" stroke-width="2.5" fill="none"/>
  <path d="M 8 12 Q 16 8 24 12" stroke="white" stroke-width="1.5" fill="none"/>
  
  <!-- Parachute lines - thicker -->
  <line x1="6" y1="12" x2="13" y2="20" stroke="white" stroke-width="1.5"/>
  <line x1="16" y1="8" x2="16" y2="20" stroke="white" stroke-width="1.5"/>
  <line x1="26" y1="12" x2="19" y2="20" stroke="white" stroke-width="1.5"/>
  
  <!-- SOL coin - larger and more prominent -->
  <circle cx="16" cy="23" r="5" fill="white"/>
  <circle cx="16" cy="23" r="4" fill="#7c3aed"/>
  
  <!-- SOL symbol - bold and clear -->
  <text x="16" y="27" font-family="Arial, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="white">SOL</text>
</svg>