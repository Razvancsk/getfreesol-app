<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background circle with white border for visibility -->
  <circle cx="16" cy="16" r="16" fill="white"/>
  <circle cx="16" cy="16" r="15" fill="url(#bg)"/>
  
  <!-- Parachute - thicker and more visible -->
  <path d="M 4 12 Q 16 2 28 12" stroke="white" stroke-width="3" fill="none"/>
  <path d="M 6 12 Q 16 6 26 12" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- Parachute lines - thicker -->
  <line x1="4" y1="12" x2="12" y2="24" stroke="white" stroke-width="2"/>
  <line x1="16" y1="6" x2="16" y2="24" stroke="white" stroke-width="2"/>
  <line x1="28" y1="12" x2="20" y2="24" stroke="white" stroke-width="2"/>
  
  <!-- SOL coin - larger and more prominent -->
  <circle cx="16" cy="26" r="6" fill="white"/>
  <circle cx="16" cy="26" r="5" fill="#8b5cf6"/>
  
  <!-- SOL symbol - bold and clear -->
  <text x="16" y="30" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">S</text>
</svg>