<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GSOL Welcome Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0118;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    position: relative;
    width: 340px;
    background: linear-gradient(145deg, #1a0533, #2d0a5e, #1a0533);
    border: 1px solid rgba(168,85,247,0.3);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    box-shadow: 0 25px 60px rgba(88,28,135,0.6);
    overflow: hidden;
  }
  .glow-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to bottom, rgba(147,51,234,0.25), transparent);
    pointer-events: none;
  }
  .token-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    margin-bottom: 14px;
  }
  .token-blur {
    position: absolute;
    width: 64px; height: 64px;
    background: rgba(168,85,247,0.45);
    border-radius: 50%;
    filter: blur(18px);
    top: 0;
  }
  .token-img {
    position: relative;
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(192,132,252,0.5);
    box-shadow: 0 4px 20px rgba(88,28,135,0.5);
    object-fit: cover;
  }
  .title {
    font-size: 22px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.25;
    margin-bottom: 8px;
    position: relative;
  }
  .subtitle {
    font-size: 13px;
    font-weight: 600;
    color: #c4b5fd;
    margin-bottom: 20px;
    position: relative;
  }
  .apy {
    font-size: 32px;
    font-weight: 900;
    color: #ffffff;
    margin-bottom: 12px;
    position: relative;
  }
  .bullets {
    text-align: left;
    margin-bottom: 18px;
    position: relative;
  }
  .bullet {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .bullet-icon { font-size: 17px; flex-shrink: 0; }
  .bullet-text { font-size: 13px; font-weight: 600; color: #ffffff; }
  .tagline {
    font-size: 13px;
    font-weight: 600;
    color: #facc15;
    margin-bottom: 18px;
    position: relative;
  }
  .cta {
    display: block;
    width: 100%;
    padding: 13px;
    background: linear-gradient(to right, #9333ea, #7c3aed);
    color: #ffffff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(88,28,135,0.5);
    position: relative;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow-top"></div>
  <div class="token-wrap">
    <div class="token-blur"></div>
    <img class="token-img"
      src="https://nsh7c2agdjc3rb4yh3i57wm6tlvoqxeh6dfjmnnpumqcrfl4vgwa.arweave.net/bI_xaAYaRbiHmD7R39memuroXIfwypY1r6MgKJV8qaw"
      onerror="this.src='https://arweave.net/bI_xaAYaRbiHmD7R39memuroXIfwypY1r6MgKJV8qaw'"
      alt="GSOL"/>
  </div>
  <h2 class="title">Get Free Sol Liquid<br/>Staking Token is Live!</h2>
  <p class="subtitle">Stake SOL. Earn Yield. Stay Liquid.</p>
  <p class="apy">7.20% APY</p>
  <div class="bullets">
    <div class="bullet"><span class="bullet-icon">💧</span><span class="bullet-text">Stay Liquid — use GSOL in DeFi while earning</span></div>
    <div class="bullet"><span class="bullet-icon">🔒</span><span class="bullet-text">100% Secure — your SOL stays on-chain</span></div>
    <div class="bullet"><span class="bullet-icon">⚡</span><span class="bullet-text">Unstake Anytime via Jupiter</span></div>
  </div>
  <p class="tagline">Your SOL works harder with GetFreeSol.</p>
  <button class="cta">Start Staking GSOL</button>
</div>
</body>
</html>
