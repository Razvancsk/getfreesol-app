    <meta name="description" content="Reclaim your SOL rent from empty token accounts. Each empty token account holds ~0.002 SOL that can be recovered by closing the account." />
    
    <!-- Dynamic Open Graph Tags for Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Get Free Sol" />

    <meta name="twitter:site" content="@GetFreeSol" />

    <meta name="twitter:description" content="I just claimed hidden SOL from my wallet! Find out how much SOL you have waiting. Try Get Free Sol today!" id="twitter-description" />
    
    <script>
      // Dynamic Open Graph meta tags based on URL parameters
      (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const claimedLamports = urlParams.get('claimed');
        
        if (claimedLamports) {
          // Convert lamports to SOL
          const solClaimed = (parseInt(claimedLamports) / 1e9).toFixed(6);
          
          // Random messages for social sharing
          const messages = [
            `Found a sneaky ${solClaimed} $SOL chilling in my wallet 👀 Snagged it instantly with Get Free Sol 💜`,
            `Didn't expect to see ${solClaimed} $SOL appear out of nowhere 👀 Claimed it right away with Get Free Sol 💜`,
            `Tiny surprise in my wallet today — ${solClaimed} $SOL 💜 Quick claim through Get Free Sol`,
            `Found some free $SOL I didn't even know I had 😎 Get Free Sol made the claim instant 💜`,
            `🎯 Just spotted ${solClaimed} $SOL waiting for me — claimed it instantly with Get Free Sol 💜 Try your luck ⚡`,
            `Found ${solClaimed} $SOL sitting unclaimed — grabbed it in seconds with Get Free Sol ⚡ You might have some too 💜`,
            `Surprised to see ${solClaimed} $SOL ready to claim — used Get Free Sol and it was instant ⚡`,
            `🎯 Just claimed ${solClaimed} $SOL through Get Free Sol 💜 Quick, clean, and smooth ⚡`,
            `🚀 Surprised to see ${solClaimed} $SOL waiting — claimed it easily with Get Free Sol`,
            `🔥 Just noticed ${solClaimed} $SOL hiding — claimed it with Get Free Sol. Worth a look 💜`,
            `Found ${solClaimed} $SOL unclaimed — used Get Free Sol to collect it. See what you've got!`,
            `🎯 ${solClaimed} $SOL popped up — claimed it through Get Free Sol. Try your chance!`
          ];
          
          // Pick a random message based on the claimed amount (deterministic for same amount)
          const messageIndex = parseInt(claimedLamports) % messages.length;
          const description = messages[messageIndex];
          const title = `Just claimed ${solClaimed} $SOL I didn't even know I had! Your Free SOL makes it super easy. Give it a shot!`;
          
          // Update meta tags
          document.getElementById('og-title')?.setAttribute('content', title);
          document.getElementById('og-description')?.setAttribute('content', description);
          document.getElementById('twitter-title')?.setAttribute('content', title);
          document.getElementById('twitter-description')?.setAttribute('content', description);
        }
        
        // Always set the current URL
        document.getElementById('og-url')?.setAttribute('content', window.location.href);
      })();
    </script>
